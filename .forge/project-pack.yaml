version: 1
project_name: Bootstrap the architecture, documentation, and agent infrastructure
  for 'Wikiped
skills_dir: .claude/commands
constraints_primer: 'Follow AGENTS.md as canonical. Out-of-scope gaps go through propose_task
  (triage), never direct domain-board mutation. Prefer scoped git commits.

  - Use official Wikimedia APIs only (no HTML scraping).

  - Preserve the Stitch AI-generated frontend shell as the visual source of truth
  without redesigning.

  - Output ONLY bootstrap infrastructure, documentation, and empty task boards (no
  implementation tickets yet).

  - Sequential execution until file ownership boundaries are proven safe.

  - Must include WIKIMEDIA_CONTACT header for API compliance.'
